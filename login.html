<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BusStop – Login</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">
  <style>
    :root {
      --bg: #05060a;
      --panel: #0d0f18;
      --amber: #f5a623;
      --amber2: #ff7c36;
      --text: #eeeae2;
      --muted: #5a5f78;
      --border: #1c1f33;
      --input: #10131f;
      --green: #1db87e;
      --red: #e84545;
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;

    }


    /* ── Left decorative panel ── */
    .left-panel {
      flex: 1;
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      padding: 48px;
      overflow: hidden;
    }

    /* Animated dot grid background */
    .left-panel::before {
      content: '';
      position: absolute;
      inset: 0;
      background-image: radial-gradient(circle, #1e2240 1px, transparent 1px);
      background-size: 32px 32px;
      opacity: 0.6;
      animation: panShift 20s linear infinite;
    }

    @keyframes panShift {
      0% {
        background-position: 0 0;
      }

      100% {
        background-position: 64px 64px;
      }
    }

    /* Glowing orbs */
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      animation: pulse 6s ease-in-out infinite;
    }

    .orb1 {
      width: 340px;
      height: 340px;
      background: radial-gradient(circle, rgba(245, 166, 35, 0.22), transparent 70%);
      top: -60px;
      left: -80px;
      animation-delay: 0s;
    }

    .orb2 {
      width: 260px;
      height: 260px;
      background: radial-gradient(circle, rgba(255, 124, 54, 0.18), transparent 70%);
      bottom: 100px;
      left: 120px;
      animation-delay: 3s;
    }

    @keyframes pulse {

      0%,
      100% {
        transform: scale(1) translate(0, 0);
      }

      50% {
        transform: scale(1.08) translate(10px, -10px);
      }
    }

    /* Floating bus stop schedule cards */
    .float-card {
      position: absolute;
      background: rgba(13, 15, 24, 0.85);
      border: 1px solid rgba(245, 166, 35, 0.2);
      border-radius: 14px;
      padding: 14px 18px;
      backdrop-filter: blur(10px);
      animation: floatUp 4s ease-in-out infinite;
    }

    .float-card:nth-child(3) {
      top: 100px;
      left: 60px;
      animation-delay: 0s;
    }

    .float-card:nth-child(4) {
      top: 220px;
      left: 200px;
      animation-delay: 1.4s;
    }

    .float-card:nth-child(5) {
      top: 370px;
      left: 80px;
      animation-delay: 2.6s;
    }

    @keyframes floatUp {

      0%,
      100% {
        transform: translateY(0px);
      }

      50% {
        transform: translateY(-8px);
      }
    }

    .fc-route {
      font-family: 'Syne', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--amber);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .fc-stop {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      margin-bottom: 8px;
    }

    .fc-times {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .fc-time {
      background: rgba(245, 166, 35, 0.12);
      border: 1px solid rgba(245, 166, 35, 0.25);
      border-radius: 6px;
      padding: 3px 8px;
      font-size: 11px;
      font-weight: 600;
      color: var(--amber);
    }

    /* Left bottom tagline */
    .tagline {
      position: relative;
      z-index: 2;
    }

    .tag-logo {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 20px;
    }

    .tag-bus {
      width: 44px;
      height: 44px;
      background: linear-gradient(135deg, var(--amber), var(--amber2));
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 22px;
      box-shadow: 0 0 30px rgba(245, 166, 35, 0.4);
    }

    .tag-name {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.5px;
    }

    .tag-name span {
      color: var(--amber);
    }

    .tag-headline {
      font-family: 'Syne', sans-serif;
      font-size: 36px;
      font-weight: 800;
      line-height: 1.15;
      margin-bottom: 14px;
      letter-spacing: -1px;
    }

    .tag-headline em {
      font-style: normal;
      background: linear-gradient(90deg, var(--amber), var(--amber2));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      color: transparent;
    }

    .tag-sub {
      font-size: 14px;
      color: var(--muted);
      line-height: 1.6;
      max-width: 300px;
    }

    /* ── Right: Login form ── */
    .right-panel {
      width: 440px;
      flex-shrink: 0;
      background: var(--panel);
      border-left: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 44px;
      position: relative;
      overflow: hidden;
    }

    /* subtle top accent line */
    .right-panel::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--amber), var(--amber2));
    }

    .form-wrap {
      width: 100%;
      max-width: 340px;
    }

    /* Mode toggle */
    .mode-toggle {
      display: flex;
      background: var(--bg);
      border-radius: 12px;
      padding: 5px;
      gap: 4px;
      margin-bottom: 32px;
      border: 1px solid var(--border);
    }

    .mode-btn {
      flex: 1;
      padding: 10px;
      border: none;
      border-radius: 9px;
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      background: transparent;
      color: var(--muted);
      transition: all 0.25s;
      letter-spacing: 0.3px;
    }

    .mode-btn.active {
      background: linear-gradient(135deg, var(--amber), var(--amber2));
      color: #000;
      box-shadow: 0 4px 16px rgba(245, 166, 35, 0.3);
    }

    /* Form heading */
    .form-heading {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      margin-bottom: 6px;
      letter-spacing: -0.5px;
    }

    .form-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    /* Fields */
    .field {
      margin-bottom: 18px;
    }

    .field label {
      display: block;
      font-size: 11px;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .input-wrap {
      position: relative;
    }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      font-size: 16px;
      opacity: 0.45;
      pointer-events: none;
    }

    .field input {
      width: 100%;
      background: var(--input);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 13px 16px 13px 42px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .field input:focus {
      border-color: var(--amber);
      box-shadow: 0 0 0 3px rgba(245, 166, 35, 0.1);
    }

    .field input::placeholder {
      color: var(--muted);
      font-size: 14px;
    }

    /* Show/hide password */
    .eye-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      cursor: pointer;
      font-size: 16px;
      opacity: 0.4;
      transition: opacity 0.2s;
    }

    .eye-btn:hover {
      opacity: 0.8;
    }

    /* Alert boxes */
    .alert {
      display: none;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13px;
      font-weight: 500;
      margin-bottom: 16px;
      line-height: 1.4;
    }

    .alert.err {
      background: rgba(232, 69, 69, 0.12);
      border: 1px solid rgba(232, 69, 69, 0.35);
      color: #ff8a8a;
    }

    .alert.ok {
      background: rgba(29, 184, 126, 0.12);
      border: 1px solid rgba(29, 184, 126, 0.35);
      color: #5effc3;
    }

    .alert.show {
      display: block;
    }

    /* Submit button */
    .submit-btn {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--amber), var(--amber2));
      color: #000;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      letter-spacing: 0.3px;
      transition: opacity 0.2s, transform 0.15s, box-shadow 0.2s;
      box-shadow: 0 6px 24px rgba(245, 166, 35, 0.3);
      margin-top: 4px;
    }

    .submit-btn:hover {
      opacity: 0.9;
      box-shadow: 0 8px 30px rgba(245, 166, 35, 0.4);
    }

    .submit-btn:active {
      transform: scale(0.98);
    }

    /* Divider */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: var(--muted);
      font-size: 12px;
    }

    .divider::before,
    .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    /* Social buttons row */
    .social-row {
      display: flex;
      gap: 10px;
    }

    .social-btn {
      flex: 1;
      padding: 12px 10px;
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      white-space: nowrap;
    }

    .social-btn:hover {
      border-color: var(--amber);
      background: rgba(245, 166, 35, 0.05);
    }

    .google-btn {
      flex: 2;
    }

    .guest-btn2 {
      flex: 1;
      color: var(--muted);
    }

    /* Logged-in profile view */
    .profile-view {
      display: none;
      text-align: center;
    }

    .profile-view.show {
      display: block;
    }

    .form-view.hide {
      display: none;
    }

    .p-avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--amber), var(--amber2));
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Syne', sans-serif;
      font-size: 28px;
      font-weight: 800;
      color: #000;
      margin: 0 auto 18px;
      box-shadow: 0 8px 30px rgba(245, 166, 35, 0.35);
    }

    .p-name {
      font-family: 'Syne', sans-serif;
      font-size: 22px;
      font-weight: 800;
      margin-bottom: 4px;
    }

    .p-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 28px;
    }

    .p-badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      background: rgba(29, 184, 126, 0.12);
      border: 1px solid rgba(29, 184, 126, 0.3);
      border-radius: 20px;
      padding: 5px 14px;
      font-size: 12px;
      font-weight: 600;
      color: #5effc3;
      margin-bottom: 28px;
    }

    .logout-btn {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1.5px solid var(--red);
      color: var(--red);
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-bottom: 14px;
    }

    .logout-btn:hover {
      background: var(--red);
      color: #fff;
    }

    .go-home-btn {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, var(--amber), var(--amber2));
      color: #000;
      border: none;
      border-radius: 12px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
      box-shadow: 0 4px 20px rgba(245, 166, 35, 0.3);
    }

    .go-home-btn:hover {
      opacity: 0.88;
    }

    /* Mobile */
    @media (max-width: 700px) {
      .left-panel {
        display: none;
      }

      .right-panel {
        width: 100%;
        border-left: none;
        padding: 32px 24px;
      }
    }
  </style>
</head>

<body>

  <!-- ═══════════════ LEFT PANEL ═══════════════ -->
  <div class="left-panel">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>

    <!-- Floating schedule cards -->
    <div class="float-card">
      <div class="fc-route">Route 15A</div>
      <div class="fc-stop">🚌 Central Bus Stand</div>
      <div class="fc-times">
        <div class="fc-time">6:00 AM</div>
        <div class="fc-time">8:30 AM</div>
        <div class="fc-time">1:00 PM</div>
      </div>
    </div>

    <div class="float-card">
      <div class="fc-route">Route 27C</div>
      <div class="fc-stop">🚌 Town Hall Stop</div>
      <div class="fc-times">
        <div class="fc-time">7:15 AM</div>
        <div class="fc-time">12:00 PM</div>
        <div class="fc-time">5:45 PM</div>
      </div>
    </div>



    <!-- Bottom tagline -->
    <div class="tagline">
      <div class="tag-logo">
        <div class="tag-bus">🚌</div>
        <div class="tag-name">Bus<span>Stop</span></div>
      </div>
      <div class="tag-headline">Know your bus.<br><em>Never wait again.</em></div>
      <div class="tag-sub">Real-time bus stop timings, added by people in your city.</div>
    </div>
  </div>

  <!-- ═══════════════ RIGHT PANEL ═══════════════ -->
  <div class="right-panel">
    <div class="form-wrap">

      <!-- ── LOGGED IN VIEW ── -->
      <div class="profile-view" id="profileView">
        <div class="p-avatar" id="pAvatar"></div>
        <div class="p-name" id="pName"></div>
        <div class="p-sub" id="pSub"></div>
        <div class="p-badge">● Logged in</div>
        <button class="go-home-btn" onclick="goHome()">🚌 Go to Bus Stops</button>
        <br><br>
        <button class="logout-btn" onclick="doLogout()">🚪 Logout</button>
      </div>

      <!-- ── FORM VIEW ── -->
      <div class="form-view" id="formView">

        <!-- Toggle: Login / Register -->
        <div class="mode-toggle">
          <button class="mode-btn active" id="btnLogin" onclick="switchMode('login')">Login</button>
          <button class="mode-btn" id="btnRegister" onclick="switchMode('register')">Register</button>
        </div>

        <div class="form-heading" id="formHeading">Welcome back</div>
        <div class="form-sub" id="formSub">Sign in to your account</div>

        <!-- Alerts -->
        <div class="alert err" id="errBox"></div>
        <div class="alert ok" id="okBox"></div>

        <!-- Name (register only) -->
        <div class="field" id="nameField" style="display:none">
          <label>Full Name</label>
          <div class="input-wrap">
            <span class="input-icon">✏️</span>
            <input type="text" id="reg-name" placeholder="e.g. Karthik Raja">
          </div>
        </div>

        <!-- Username -->
        <div class="field">
          <label>Username</label>
          <div class="input-wrap">
            <span class="input-icon">👤</span>
            <input type="text" id="auth-user" placeholder="e.g. karthik123" oninput="clearMsg()">
          </div>
        </div>

        <!-- Password -->
        <div class="field">
          <label>Password</label>
          <div class="input-wrap">
            <span class="input-icon">🔒</span>
            <input type="password" id="auth-pass" placeholder="Enter your password"
              onkeydown="if(event.key==='Enter') handleAuth()" oninput="clearMsg()">
            <button class="eye-btn" onclick="togglePass()" id="eyeBtn">👁️</button>
          </div>
        </div>

        <!-- Submit -->
        <button class="submit-btn" id="submitBtn" onclick="handleAuth()">
          Sign In
        </button>

        <div class="divider">or continue as</div>

        <div class="social-row">
          <button class="social-btn google-btn" onclick="googleLogin()">
            <svg width="18" height="18" viewBox="0 0 48 48" style="flex-shrink:0">
              <path fill="#EA4335"
                d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
              <path fill="#4285F4"
                d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
              <path fill="#FBBC05"
                d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
              <path fill="#34A853"
                d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
            </svg>
            Continue with Google
          </button>

          <button class="social-btn guest-btn2" onclick="guestLogin()">
            <span style="font-size:17px">👀</span>
            Guest
          </button>
        </div>

      </div>
      <!-- end form-view -->

    </div>
  </div>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
  <script>
    // Firebase Configuration
    const firebaseConfig = {
      apiKey: "AIzaSyC_Mg9liHN8zVa0e0W7hr5N_NhnQhPYqUA",
      authDomain: "bus-timing-58180.firebaseapp.com",
      projectId: "bus-timing-58180",
      storageBucket: "bus-timing-58180.firebasestorage.app",
      messagingSenderId: "876150010889",
      appId: "1:876150010889:web:1104b883ebcf8189cab4d8"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const provider = new firebase.auth.GoogleAuthProvider();
    // ─── Storage ───
    const UKEY = 'busStopUsers_v1';
    const SKEY = 'busStopSess_v1';
    const loadUsers = () => { try { return JSON.parse(localStorage.getItem(UKEY)) || []; } catch { return []; } };
    const saveUsers = u => localStorage.setItem(UKEY, JSON.stringify(u));
    const getSess = () => { try { return JSON.parse(localStorage.getItem(SKEY)); } catch { return null; } };
    const setSess = u => localStorage.setItem(SKEY, JSON.stringify(u));
    const clearSess = () => localStorage.removeItem(SKEY);

    // ─── Init: check if already logged in ───
    window.addEventListener('DOMContentLoaded', () => {
      const sess = getSess();
      if (sess) showProfile(sess);
    });

    // ─── Mode toggle ───
    let mode = 'login';

    function switchMode(m) {
      mode = m;
      document.getElementById('btnLogin').classList.toggle('active', m === 'login');
      document.getElementById('btnRegister').classList.toggle('active', m === 'register');
      document.getElementById('nameField').style.display = m === 'register' ? 'block' : 'none';
      document.getElementById('formHeading').textContent = m === 'login' ? 'Welcome back' : 'Create account';
      document.getElementById('formSub').textContent = m === 'login' ? 'Sign in to your account' : 'Join the community';
      document.getElementById('submitBtn').textContent = m === 'login' ? 'Sign In' : 'Create Account';
      clearMsg();
    }

    // ─── Messages ───
    function clearMsg() {
      ['errBox', 'okBox'].forEach(id => {
        const el = document.getElementById(id);
        el.classList.remove('show'); el.textContent = '';
      });
    }
    const showErr = msg => { const e = document.getElementById('errBox'); e.textContent = msg; e.classList.add('show'); };
    const showOk = msg => { const e = document.getElementById('okBox'); e.textContent = msg; e.classList.add('show'); };

    // ─── Password toggle ───
    function togglePass() {
      const inp = document.getElementById('auth-pass');
      const btn = document.getElementById('eyeBtn');
      if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
      else { inp.type = 'password'; btn.textContent = '👁️'; }
    }

    // ─── Auth ───
    function handleAuth() {
      clearMsg();
      const username = document.getElementById('auth-user').value.trim();
      const password = document.getElementById('auth-pass').value.trim();
      const name = document.getElementById('reg-name').value.trim();

      if (!username) { showErr('❗ Username enter பண்ணு!'); return; }
      if (username.length < 3) { showErr('❗ Username குறைந்தது 3 letters வேணும்!'); return; }
      if (!password) { showErr('❗ Password enter பண்ணு!'); return; }
      if (password.length < 4) { showErr('❗ Password குறைந்தது 4 characters வேணும்!'); return; }

      const users = loadUsers();

      if (mode === 'register') {
        if (users.find(u => u.username === username)) {
          showErr('❗ இந்த username already இருக்கு! வேற ஒன்னு try பண்ணு.'); return;
        }
        const newUser = { username, password, name: name || username };
        users.push(newUser);
        saveUsers(users);
        showOk('✅ Account create ஆச்சு! இப்போ login பண்ணு.');
        setTimeout(() => switchMode('login'), 1600);

      } else {
        const user = users.find(u => u.username === username && u.password === password);
        if (!user) { showErr('❗ Username அல்லது Password தப்பா இருக்கு!'); return; }
        setSess(user);
        showOk('✅ Login success! Welcome ' + (user.name || user.username) + ' 🎉');
        setTimeout(() => {
          window.location.href = "bus_stop.html";
        }, 1200);
      }
    }

    // ─── Show profile after login ───
    function showProfile(user) {
      const label = user.name || user.username;
      const abbr = label.split(' ').map(w => w[0]).join('').toUpperCase().slice(0, 2);
      document.getElementById('pAvatar').textContent = abbr;
      document.getElementById('pName').textContent = label;
      document.getElementById('pSub').textContent = '@' + user.username;
      document.getElementById('profileView').classList.add('show');
      document.getElementById('formView').classList.add('hide');
    }

    // ─── Logout ───
    function doLogout() {
      auth.signOut().then(() => {
        clearSess();
        document.getElementById('profileView').classList.remove('show');
        document.getElementById('formView').classList.remove('hide');
        document.getElementById('auth-user').value = '';
        document.getElementById('auth-pass').value = '';
        clearMsg();
      });
    }
    // ─── Google login (simulated — shows popup note) ───
    function googleLogin() {
      clearMsg();

      auth.signInWithPopup(provider)
        .then((result) => {
          const user = result.user;

          // Firebase-la irundhu vara details-a namma session format-ku mathrom
          const mockUser = {
            username: user.email.split('@')[0], // email-oda first part-a username-a vaikrom
            name: user.displayName,
            email: user.email,
            photo: user.photoURL,
            type: 'google'

          };

          // 👇 NEW CODE (IMPORTANT)
          let users = loadUsers();

          // already user iruka check
          if (!users.find(u => u.username === mockUser.username)) {
            users.push({
              username: mockUser.username,
              password: "google_user", // dummy password
              name: mockUser.name
            });
            saveUsers(users);
          }

          setSess(mockUser);
          showOk('✅ Google Login Success! Welcome ' + user.displayName);

          setTimeout(() => {
            showProfile(mockUser);
            // Login aanadhum 1.5 seconds-la home page poidum
            setTimeout(() => goHome(), 1500);
          }, 1000);
        })
        .catch((error) => {
          console.error(error);
          showErr('❗ Google Login-la prechana: ' + error.message);
        });
    }

    // ─── Guest login ───
    function guestLogin() {
      const guestUser = { username: 'guest', name: 'Guest', type: 'guest' };
      setSess(guestUser);
      goHome();
    }

    // ─── Go to main page ───
    function goHome() {
      window.location.href = 'bus_stop.html';
    }
  </script>
</body>
